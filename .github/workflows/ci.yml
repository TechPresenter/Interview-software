name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server · lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test
        env:
          JWT_ACCESS_SECRET: ci-access-secret-0123456789
          JWT_REFRESH_SECRET: ci-refresh-secret-0123456789
          MONGO_URI: mongodb://localhost:27017/hiresense-test
          REDIS_URL: redis://localhost:6379

  client:
    name: Web · lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
          NEXT_TELEMETRY_DISABLED: '1'

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [server, client]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t hiresense-api ./server
      - name: Build Web image
        run: docker build -t hiresense-web ./client
